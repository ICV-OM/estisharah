<style>
*{box-sizing:border-box;margin:0;padding:0}
[dir="rtl"] *{font-family:'Tajawal','Noto Kufi Arabic',sans-serif}
[dir="ltr"] *{font-family:'Inter',sans-serif}
html{font-size:16px}
.fade{animation:fadeIn .35s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.bounce-in{animation:bi .5s ease}@keyframes bi{0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.cat-card{transition:all .3s}
.cat-card:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,.12)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
/* Hero Slider */
.hero-slider{position:relative;height:420px;overflow:hidden}
@media(max-width:768px){.hero-slider{height:320px}}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;z-index:1}
.hero-slide.active{opacity:1;z-index:2}
.hero-slide img,.hero-slide video{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.3) 0%,rgba(0,0,0,.55) 100%);z-index:3}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:4;color:#fff;text-align:center;padding:1rem}
.hero-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px}
.hero-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .3s}
.hero-dot.active{background:#fff;transform:scale(1.3)}
.hero-arrows{position:absolute;top:50%;z-index:5;transform:translateY(-50%);display:flex;justify-content:space-between;width:100%;padding:0 12px;pointer-events:none}
.hero-arrow{width:40px;height:40px;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;transition:all .3s;border:1px solid rgba(255,255,255,.3)}
.hero-arrow:hover{background:rgba(255,255,255,.4)}
</style>
</head>

  back:['العودة','Back'],available:['متاح','Available'],years:['سنوات','years'],about:['نبذة','About'],category:['التصنيف','Category'],

function L(k){return T[k]?T[k][lang==='ar'?0:1]:(typeof k==='string'?k:k);}

function applyLang(){
  $('langBtn').textContent=lang==='ar'?'EN':'عربي';
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.documentElement.lang=lang;
  $('logoTxt').textContent=L('siteName');$('navHome').textContent=L('home');$('navMy').textContent=L('myBook');
  $('navTeach').textContent=L('provPanel');$('navAdm').textContent=L('adminPanel');
  $('btnLogin').textContent=L('login');$('btnReg').textContent=L('register');
  $('dAdm').textContent='⚙️ '+L('adminPanel');$('dTeach').textContent='📊 '+L('provPanel');$('dMy').textContent='📋 '+L('myBook');$('dOut').textContent=L('logout');
  $('locTitle').textContent=L('locQ');$('locOk').textContent=L('showAct');$('locSkip').textContent=L('showAll');
  $('devTitle').textContent=L('devTitle');$('devSub').textContent=L('devSub');$('devClose').textContent=L('close');
}
function changeLang(){lang=lang==='ar'?'en':'ar';applyLang();goHome();}

// ===== UTILS =====
function toast(m){const t=$('toast');t.textContent=m;t.classList.remove('opacity-0','translate-y-4','pointer-events-none');t.classList.add('opacity-100','translate-y-0');setTimeout(()=>{t.classList.add('opacity-0','translate-y-4','pointer-events-none');t.classList.remove('opacity-100','translate-y-0');},3000);}
function stars(n){return Array.from({length:5}).map((_,i)=>`<svg class="w-3.5 h-3.5 inline ${i<n?'text-yellow-500 fill-yellow-500':'text-gray-300'}" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`).join('');}
document.addEventListener('click',e=>{if(!e.target.closest('#uBtn'))$('uDrop')?.classList.add('hidden');});
function gn(g){return g?(lang==='ar'?g.name_ar:g.name_en):'';}
function cn(c){return c?(lang==='ar'?c.name_ar:c.name_en):'';}
function pn(p){return lang==='ar'?p.name_ar:(p.name_en||p.name_ar);}
function ps(p){return lang==='ar'?(p.specialization_ar||''):(p.specialization_en||p.specialization_ar||'');}
function pb(p){return lang==='ar'?(p.bio_ar||''):(p.bio_en||p.bio_ar||'');}

function updateUI(){
  if(curUser){
    $('gBtns').classList.add('hidden');$('uBtn').classList.remove('hidden');
    $('avI').textContent=curUser.name[0];$('hNm').textContent=curUser.name.split(' ')[0];
    $('dNm').textContent=curUser.name;$('dEm').textContent=curUser.email;
    const rl=curUser.role;$('dRl').textContent=rl==='admin'?L('admin'):rl==='teacher'?L('teacher'):L('user');
    $('dRl').className=`inline-block mt-1 px-2 py-0.5 rounded-full text-xs font-bold ${rl==='admin'?'bg-red-50 text-red-600':rl==='teacher'?'bg-green-50 text-green-600':'bg-blue-50 text-blue-600'}`;
    $('navAdm').classList.toggle('hidden',rl!=='admin');$('dAdm').classList.toggle('hidden',rl!=='admin');
    $('navTeach').classList.toggle('hidden',rl!=='teacher');$('dTeach').classList.toggle('hidden',rl!=='teacher');
    $('navMy').classList.remove('hidden');
  }else{$('gBtns').classList.remove('hidden');$('uBtn').classList.add('hidden');['navAdm','navProv','navMy'].forEach(x=>$(x).classList.add('hidden'));}
}

function openLocMod(){

  updateWilSel();

    languages:$('pLn').value.split(/[,،]/).map(s=>s.trim()).filter(Boolean),subjects:$('pSb').value.split(/[,،]/).map(s=>s.trim()).filter(Boolean),
    category_id:+$('pCat').value,governorate_id:+$('pGov').value,wilayat_id:+($('pWil')?.value||0),is_online:$('pOn').checked};
  await PATCH('teachers',d,`?id=eq.${p.id}`);toast(L('saved'));showTeacherDash();
}
function updatePWil(){const gid=+($('pGov')?.value||0);const ws=$('pWil');if(!ws)return;ws.innerHTML=wils.filter(w=>w.governorate_id===gid).map(w=>`<option value="${w.id}">${wn(w)}</option>`).join('');}
async function saveSched(){
  const pid=window._tch.id;const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  for(const d of days){const v=$('sl_'+d)?.value||'';const slots=v.split(/[,،]/).map(s=>s.trim()).filter(Boolean);
    await DEL('availability',`?teacher_id=eq.${pid}&day_name=eq.${encodeURIComponent(d)}`);
    if(slots.length)await POST('availability',[{teacher_id:pid,day_name:d,slots}]);}
  toast(L('schedSaved'));showTeacherDash();
}

// ===== ADMIN PANEL =====

    <div class="bg-gradient-to-br from-blue-600 to-indigo-800 text-white rounded-xl p-5 mb-4"><h2 class="text-lg font-bold">⚙️ ${L('adminPanel')}</h2></div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="bg-white rounded-xl p-3 border"><div class="text-lg">👥</div><div class="text-xl font-bold">${users.length}</div><div class="text-xs text-gray-500">${L('users')}</div></div>
      <div class="bg-white rounded-xl p-3 border"><div class="text-lg">👨‍🏫</div><div class="text-xl font-bold">${provs.length}</div><div class="text-xs text-gray-500">${L('teachers')}</div></div>
      <div class="bg-white rounded-xl p-3 border"><div class="text-lg">📅</div><div class="text-xl font-bold">${bks.length}</div><div class="text-xs text-gray-500">${L('bookings')}</div></div>
      <div class="bg-white rounded-xl p-3 border"><div class="text-lg">💰</div><div class="text-xl font-bold">${rev} ${L('omr')}</div><div class="text-xs text-gray-500">${L('revenue')}</div></div>
    </div>
    <div class="flex gap-1 bg-white p-1 rounded-xl border mb-4">
      <button onclick="aTab('u')" class="flex-1 py-2 rounded-lg font-semibold text-xs bg-blue-600 text-white" id="at_u">👥 ${L('users')}</button>
      <button onclick="aTab('p')" class="flex-1 py-2 rounded-lg font-semibold text-xs text-gray-600" id="at_p">👨‍🏫 ${L('teachers')}</button>
      <button onclick="aTab('b')" class="flex-1 py-2 rounded-lg font-semibold text-xs text-gray-600" id="at_b">📅 ${L('bookings')}</button>
    </div>

function aTab(t){
  ['u','p','b'].forEach(x=>{const e=$('at_'+x);if(e)e.className='flex-1 py-2 rounded-lg font-semibold text-xs '+(x===t?'bg-blue-600 text-white':'text-gray-600 hover:bg-gray-50');});
  if(t==='u'){
    const us=window._aU||[];
    $('aCont').innerHTML=us.map(u=>`<div class="bg-white rounded-xl p-3 border shadow-sm mb-2">
      <div class="flex items-center justify-between"><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-lg ${u.role==='admin'?'bg-red-500':u.role==='teacher'?'bg-green-500':'bg-blue-600'} text-white flex items-center justify-center font-bold text-xs">${u.name[0]}</div><div><div class="font-semibold text-sm">${u.name}</div><div class="text-xs text-gray-500">${u.email}</div></div></div>
      <span class="px-2 py-0.5 rounded-full text-xs font-bold ${u.role==='admin'?'bg-red-50 text-red-600':u.role==='teacher'?'bg-green-50 text-green-600':'bg-blue-50 text-blue-600'}">${u.role==='admin'?L('admin'):u.role==='teacher'?L('teacher'):L('user')}</span></div>
      ${u.role!=='admin'?`<div class="flex gap-1 justify-end mt-2">
        <button onclick="chRole(${u.id},'user')" class="px-2 py-1 text-xs border rounded-lg ${u.role==='user'?'bg-blue-50 text-blue-600 border-blue-200':'hover:bg-gray-50'}">${L('user')}</button>
        <button onclick="chRole(${u.id},'teacher')" class="px-2 py-1 text-xs border rounded-lg ${u.role==='teacher'?'bg-green-50 text-green-600 border-green-200':'hover:bg-gray-50'}">${L('teacher')}</button>
        <button onclick="chRole(${u.id},'admin')" class="px-2 py-1 text-xs border rounded-lg hover:bg-gray-50">${L('admin')}</button>
        <button onclick="delU(${u.id})" class="px-2 py-1 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50">🗑️</button>
      </div>`:''}</div>`).join('');
  }else if(t==='p'){
    const ps2=window._aT||[];
    $('aCont').innerHTML=`<div class="mb-3"><button onclick="addTeacherForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-semibold hover:bg-green-700">➕ ${L('addTeacher')}</button></div><div id="addPA"></div>
    ${ps2.map(p=>`<div class="bg-white rounded-xl p-3 border shadow-sm mb-2 flex items-center justify-between">
      <div class="flex items-center gap-2"><img src="${p.image}" class="w-9 h-9 rounded-lg object-cover" onerror="this.style.display='none'"><div><div class="font-semibold text-sm">${p.name_ar}</div><div class="text-xs text-gray-500">${(p.subjects||[]).slice(0,3).join('، ')}</div></div></div>
      <div class="flex items-center gap-2"><span class="text-xs font-bold text-blue-600">${p.hourly_rate} ${L('omr')}</span><span class="text-xs text-gray-500">⭐ ${p.rating}</span>
      <button onclick="togTeacher(${p.id},${!p.is_active})" class="px-2 py-1 text-xs border rounded-lg ${p.is_active?'text-red-600 border-red-200':'text-green-600 border-green-200'}">${p.is_active?L('disable'):L('enable')}</button>
      <button onclick="delTeacher(${p.id})" class="px-2 py-1 text-xs text-red-600 border border-red-200 rounded-lg">🗑️</button></div></div>`).join('')}`;
  }else{
    const bks=window._aB||[];
    $('aCont').innerHTML=bks.length?bks.map(b=>`<div class="bg-white rounded-xl p-3 border shadow-sm mb-2 text-xs">
      <div class="flex items-center justify-between mb-1"><div><b>${b.teacher_name}</b> ← ${b.student_name}</div>
      <span class="px-2 py-0.5 rounded-full font-bold ${b.status==='active'?'bg-green-50 text-green-600':b.status==='cancelled'?'bg-red-50 text-red-600':'bg-amber-50 text-amber-600'}">${b.status==='active'?L('active'):b.status==='cancelled'?L('cancelled'):L('completed')}</span></div>
      <div class="flex items-center justify-between"><span class="text-gray-500">${b.subject} · ${b.booking_date} · ${b.booking_time} · ${b.price} ${L('omr')}</span>
      ${b.status==='active'?`<button onclick="canBk(${b.id})" class="text-red-600 border border-red-200 px-2 py-0.5 rounded-lg">${L('cancel')}</button>`:''}</div></div>`).join('')
    :`<div class="text-center py-8 text-gray-400">${L('noBook')}</div>`;
  }
}

function addTeacherForm(){
  $('addPA').innerHTML=`<div class="bg-green-50 rounded-xl p-4 border-2 border-green-200 mb-3">
    <h4 class="font-bold mb-2 text-xs">➕ ${L('addTeacher')}</h4>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
      <input id="nN" placeholder="${L('name')}" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-xs">
      <input id="nE" placeholder="${L('email')}" dir="ltr" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-xs">
      <input id="nS" placeholder="${L('spec')}" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-xs">
      <input id="nPr" type="number" placeholder="${L('priceH')}" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-xs">
      <input id="nIm" placeholder="${L('imgUrl')}" dir="ltr" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-xs">
      <select id="nCat" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-xs">${cats.map(c=>`<option value="${c.id}">${cn(c)}</option>`).join('')}</select>
    </div>
    <div class="flex gap-2"><button onclick="createTeacher()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-semibold">✅ ${L('create')}</button><button onclick="$('addPA').innerHTML=''" class="bg-gray-200 px-4 py-2 rounded-lg text-xs">${L('cancel')}</button></div>
  </div>`;
}
async function createTeacher(){
  const n=$('nN').value,e=$('nE').value,s=$('nS').value,pr=+$('nPr').value,im=$('nIm').value,ct=+$('nCat').value;
  if(!n||!e)return toast(L('fillFields'));
  const uR=await POST('users',[{name:n,email:e,phone:'',password:'123456',role:'teacher'}]);
  if(!uR?.length)return toast(L('emailExists'));
  await POST('teachers',[{user_id:uR[0].id,category_id:ct,governorate_id:selGov||1,name_ar:n,image:im||'',specialization_ar:s,hourly_rate:pr,subjects:[],languages:['العربية']}]);
  toast(L('saved'));showAdmin();
}
async function chRole(uid,role){
  await PATCH('users',{role},`?id=eq.${uid}`);
  if(role==='teacher'){const u=(window._aU||[]).find(x=>x.id===uid);if(u){const ex=await GET('teachers',`?user_id=eq.${uid}`);if(!ex?.length)await POST('teachers',[{user_id:uid,name_ar:u.name,image:'',subjects:[],languages:['العربية'],governorate_id:selGov||1,category_id:cats[0]?.id||1}]);}}
  toast(L('roleChanged'));showAdmin();
}
async function delU(id){if(!confirm(L('confirmDel')))return;await DEL('users',`?id=eq.${id}`);toast(L('deleted'));showAdmin();}
async function togTeacher(id,act){await PATCH('teachers',{is_active:act},`?id=eq.${id}`);toast(act?L('enable'):L('disable'));showAdmin();}
async function delTeacher(id){if(!confirm(L('confirmDel')))return;await DEL('teachers',`?id=eq.${id}`);toast(L('deleted'));showAdmin();}
async function canBk(id){await PATCH('bookings',{status:'cancelled'},`?id=eq.${id}`);toast(L('bookCancelled'));showAdmin();}

// ===== HERO SLIDER =====
let sliderIdx=0,sliderTimer=null;
function initSlider(){
  const slides=document.querySelectorAll('.hero-slide:not(.hero-overlay)');if(!slides.length)return;
  const dots=$('heroDots');if(dots)dots.innerHTML=Array.from({length:slides.length}).map((_,i)=>`<div class="hero-dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`).join('');
  slides.forEach((s,i)=>{const v=s.querySelector('video');if(v&&i===0)v.play();});
  sliderTimer=setInterval(()=>slideHero(1),5000);
}
function slideHero(dir){
  const slides=document.querySelectorAll('.hero-slide:not(.hero-overlay)');if(!slides.length)return;
  slides[sliderIdx].classList.remove('active');const v1=slides[sliderIdx].querySelector('video');if(v1)v1.pause();
  sliderIdx=(sliderIdx+dir+slides.length)%slides.length;
  slides[sliderIdx].classList.add('active');const v2=slides[sliderIdx].querySelector('video');if(v2){v2.currentTime=0;v2.play();}
  document.querySelectorAll('.hero-dot').forEach((d,i)=>d.classList.toggle('active',i===sliderIdx));
  clearInterval(sliderTimer);sliderTimer=setInterval(()=>slideHero(1),5000);
}
function goSlide(i){
  const slides=document.querySelectorAll('.hero-slide:not(.hero-overlay)');if(!slides.length)return;
  slides[sliderIdx].classList.remove('active');const v1=slides[sliderIdx].querySelector('video');if(v1)v1.pause();
  sliderIdx=i;slides[sliderIdx].classList.add('active');const v2=slides[sliderIdx].querySelector('video');if(v2){v2.currentTime=0;v2.play();}
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  clearInterval(sliderTimer);sliderTimer=setInterval(()=>slideHero(1),5000);
}
