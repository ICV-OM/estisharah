<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<style>
*{font-family:'Tajawal','Noto Kufi Arabic',sans-serif;box-sizing:border-box}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.bounce-in{animation:bounceIn .6s ease}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

<body class="bg-gray-50 min-h-screen">

<!-- HEADER -->

    <div class="flex items-center gap-3">
      <nav class="hidden md:flex items-center gap-5 ml-4">
        <button onclick="goHome()" class="text-sm text-gray-700 hover:text-blue-600 font-semibold">الرئيسية</button>
        <button onclick="showMyBookings()" class="text-sm text-gray-700 hover:text-blue-600 font-semibold hidden" id="navMyBook">حجوزاتي</button>
        <button onclick="showTeacherDash()" class="text-sm text-gray-700 hover:text-blue-600 font-semibold hidden" id="navTeacher">لوحة المعلم</button>
        <button onclick="showAdmin()" class="text-sm text-gray-700 hover:text-blue-600 font-semibold hidden" id="navAdmin">لوحة التحكم</button>

      <div id="guestBtns" class="flex gap-2">

        <button onclick="toggleDrop()" class="flex items-center gap-2 px-2 py-1.5 rounded-lg border border-gray-200 hover:bg-gray-50">

          <span class="font-semibold text-sm hidden sm:inline" id="headerName"></span>
          <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
        </button>

          <div class="p-3 border-b bg-gray-50"><div class="font-semibold text-sm" id="dropName"></div><div class="text-xs text-gray-500" id="dropEmail"></div><span class="inline-block mt-1 px-2 py-0.5 rounded-full text-xs font-bold" id="dropRole"></span></div>

          <button onclick="showMyBookings()" class="w-full px-4 py-2.5 text-right text-sm text-gray-700 hover:bg-gray-50" id="dropMyBook">📋 حجوزاتي</button>

      </div>

</header>
<main id="app"><div class="flex items-center justify-center py-20"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div></main>

<!-- AUTH MODAL -->
<div id="authModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden" onclick="if(event.target===this)closeAuth()">
  <div class="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl">

<script>
// ==================== SUPABASE CONFIG ====================
const SUPA_URL='https://awpuxmuvujgmsweiqgxt.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3cHV4bXV2dWpnbXN3ZWlxZ3h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTUyMzUsImV4cCI6MjA4NzQzMTIzNX0.GvqbFi-TqkrrmRrqnZCbBR3UsLRF5UrXyQESMZ0TTlk';
const H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const AD=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const AM=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
let curUser=null,selTutor=null,curBooking=null,bookStep=1,selDate=null,selTime='',selSubj='';
const $=id=>document.getElementById(id);

// ==================== SUPABASE API ====================
async function supa(table,method='GET',body=null,query=''){
  const opts={method,headers:{...H}};
  if(body)opts.body=JSON.stringify(body);
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,opts);
    if(!r.ok){const e=await r.text();console.error('Supa error:',e);return null;}
    const txt=await r.text();return txt?JSON.parse(txt):[];
  }catch(e){console.error('Network:',e);return null;}
}
async function supaGet(table,q=''){return supa(table,'GET',null,q);}
async function supaPost(table,body){return supa(table,'POST',body);}
async function supaPatch(table,body,q){return supa(table,'PATCH',body,q);}
async function supaDel(table,q){return supa(table,'DELETE',null,q);}

// ==================== UTILS ====================
function toast(m){const t=$('toast');t.textContent=m;t.className='fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full font-semibold text-sm shadow-2xl z-50 opacity-100 translate-y-0 transition-all duration-300';setTimeout(()=>{t.className='fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full font-semibold text-sm shadow-2xl z-50 opacity-0 translate-y-4 pointer-events-none transition-all duration-300';},3000);}
function stars(n){return Array.from({length:5}).map((_,i)=>`<svg class="w-4 h-4 inline ${i<n?'text-yellow-500 fill-yellow-500':'text-gray-300'}" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`).join('');}
function toggleDrop(){$('userDrop').classList.toggle('hidden');}
document.addEventListener('click',e=>{if(!e.target.closest('#userBtn'))$('userDrop')?.classList.add('hidden');});

function updateUI(){
  if(curUser){
    $('guestBtns').classList.add('hidden');$('userBtn').classList.remove('hidden');
    $('avatarInit').textContent=curUser.name[0];$('headerName').textContent=curUser.name.split(' ')[0];
    $('dropName').textContent=curUser.name;$('dropEmail').textContent=curUser.email;
    const r=$('dropRole');r.textContent=curUser.role==='admin'?'مدير':curUser.role==='teacher'?'معلم':'مستخدم';
    r.className=`inline-block mt-1 px-2 py-0.5 rounded-full text-xs font-bold ${curUser.role==='admin'?'bg-red-50 text-red-600':curUser.role==='teacher'?'bg-green-50 text-green-600':'bg-blue-50 text-blue-600'}`;
    $('navAdmin').classList.toggle('hidden',curUser.role!=='admin');$('dropAdmin').classList.toggle('hidden',curUser.role!=='admin');
    $('navTeacher').classList.toggle('hidden',curUser.role!=='teacher');$('dropTeacher').classList.toggle('hidden',curUser.role!=='teacher');
    $('navMyBook').classList.remove('hidden');$('dropMyBook').classList.remove('hidden');
  }else{
    $('guestBtns').classList.remove('hidden');$('userBtn').classList.add('hidden');
    $('navAdmin').classList.add('hidden');$('navTeacher').classList.add('hidden');$('navMyBook').classList.add('hidden');
  }
}

// ==================== AUTH ====================
function openAuth(t='login'){$('authModal').classList.remove('hidden');switchAuth(t);}
function closeAuth(){$('authModal').classList.add('hidden');}
function switchAuth(t){
  $('tabLogin').className=`flex-1 py-2.5 font-semibold text-sm border-b-2 ${t==='login'?'border-blue-600 text-blue-600':'border-transparent text-gray-400'}`;
  $('tabReg').className=`flex-1 py-2.5 font-semibold text-sm border-b-2 ${t==='register'?'border-blue-600 text-blue-600':'border-transparent text-gray-400'}`;
  $('authTitle').textContent=t==='login'?'تسجيل الدخول':'إنشاء حساب';
  if(t==='login'){
    $('authBody').innerHTML=`<div class="space-y-3">
      <div class="bg-blue-50 p-2.5 rounded-lg text-center text-xs border border-blue-100">🔑 أدمن: <b class="text-blue-600">admin@admin.com</b> / <b class="text-blue-600">admin123</b><br>👨‍🏫 معلم: <b class="text-blue-600">ahmad.teacher@test.com</b> / <b class="text-blue-600">123456</b></div>
      <div><label class="block text-sm font-semibold mb-1">البريد الإلكتروني</label><input id="lEmail" type="email" dir="ltr" placeholder="email@example.com" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="block text-sm font-semibold mb-1">كلمة المرور</label><input id="lPw" type="password" dir="ltr" placeholder="كلمة المرور" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="authErr" class="text-xs text-red-600 bg-red-50 p-2.5 rounded-lg hidden"></div>
      <button onclick="doLogin()" class="w-full py-2.5 rounded-lg font-semibold text-white bg-blue-600 hover:bg-blue-700 text-sm">تسجيل الدخول</button></div>`;
  }else{
    $('authBody').innerHTML=`<div class="space-y-3">
      <div><label class="block text-sm font-semibold mb-1">الاسم الكامل</label><input id="rName" placeholder="أدخل اسمك" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="block text-sm font-semibold mb-1">البريد الإلكتروني</label><input id="rEmail" type="email" dir="ltr" placeholder="email@example.com" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="block text-sm font-semibold mb-1">رقم الهاتف</label><input id="rPhone" type="tel" dir="ltr" placeholder="+968 XXXX XXXX" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="block text-sm font-semibold mb-1">كلمة المرور</label><input id="rPw" type="password" dir="ltr" placeholder="6 أحرف على الأقل" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm"></div>
      <div><label class="block text-sm font-semibold mb-1">تأكيد كلمة المرور</label><input id="rPw2" type="password" dir="ltr" placeholder="أعد إدخال كلمة المرور" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <div id="authErr" class="text-xs text-red-600 bg-red-50 p-2.5 rounded-lg hidden"></div>
      <button onclick="doRegister()" class="w-full py-2.5 rounded-lg font-semibold text-white bg-green-600 hover:bg-green-700 text-sm">إنشاء الحساب</button></div>`;
  }
}
function showErr(m){const e=$('authErr');if(e){e.textContent=m;e.classList.remove('hidden');}}
async function doLogin(){
  const email=$('lEmail')?.value.trim(),pw=$('lPw')?.value;
  if(!email||!pw)return showErr('⚠️ أدخل البريد وكلمة المرور');
  const users=await supaGet('users',`?email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(pw)}`);
  if(!users||!users.length)return showErr('❌ بيانات غير صحيحة');
  curUser=users[0];closeAuth();updateUI();toast('مرحباً '+curUser.name+' 👋');
}
async function doRegister(){
  const name=$('rName')?.value.trim(),email=$('rEmail')?.value.trim(),phone=$('rPhone')?.value.trim(),pw=$('rPw')?.value,pw2=$('rPw2')?.value;
  if(!name||!email||!pw)return showErr('⚠️ أكمل جميع الحقول');
  if(pw.length<6)return showErr('⚠️ كلمة المرور 6 أحرف على الأقل');
  if(pw!==pw2)return showErr('⚠️ كلمتا المرور غير متطابقتين');
  const exist=await supaGet('users',`?email=eq.${encodeURIComponent(email)}`);
  if(exist&&exist.length)return showErr('❌ البريد مسجل مسبقاً');
  const res=await supaPost('users',[{name,email,phone,password:pw,role:'user'}]);
  if(!res||!res.length)return showErr('❌ خطأ في التسجيل');
  curUser=res[0];closeAuth();updateUI();toast('مرحباً '+name+' 🎉');
}
function logout(){curUser=null;$('userDrop').classList.add('hidden');updateUI();goHome();toast('تم تسجيل الخروج');}

// ==================== HOME ====================
async function goHome(){
  selTutor=null;$('userDrop')?.classList.add('hidden');window.scrollTo(0,0);
  $('app').innerHTML=`
    <section class="bg-gradient-to-br from-blue-600 to-blue-800 text-white py-14"><div class="max-w-7xl mx-auto px-4 text-center">
      <h2 class="text-3xl md:text-4xl font-bold mb-3">اختر معلمك المثالي</h2>
      <p class="text-lg mb-6 text-blue-100">احجز مواعيدك مع أفضل المعلمين في مختلف التخصصات</p>
      <div class="max-w-2xl mx-auto relative"><svg class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="searchInput" oninput="renderTutors()" placeholder="ابحث عن معلم أو مادة..." class="w-full pr-12 pl-4 py-3.5 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm"></div>
    </div></section>
    <section class="py-5 bg-gray-50 border-b"><div class="max-w-7xl mx-auto px-4 flex flex-wrap gap-2" id="filterChips"></div></section>
    <section class="py-10"><div class="max-w-7xl mx-auto px-4">
      <h3 class="text-2xl font-bold mb-6">المعلمين المتاحين</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="tutorsGrid"><div class="col-span-full text-center py-10"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div></div></div>
    </div></section>
    <footer class="bg-gray-900 text-white py-6"><div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-400">© 2026 منصة التعليم. جميع الحقوق محفوظة.</div></footer>`;
  renderFilters();await loadTutors();
}

let allTutors=[],curFilter='الكل';
async function loadTutors(){
  const teachers=await supaGet('teachers','?is_active=eq.true&order=rating.desc');
  if(!teachers){$('tutorsGrid').innerHTML='<div class="col-span-full text-center py-10 text-red-500">❌ خطأ في الاتصال بقاعدة البيانات</div>';return;}
  allTutors=teachers;renderTutors();
}
function renderFilters(){
  const cats=["الكل","رياضيات","فيزياء","لغة عربية","لغة إنجليزية","كيمياء","أحياء","برمجة","تاريخ"];
  $('filterChips').innerHTML=cats.map(c=>`<button onclick="curFilter='${c}';renderFilters();renderTutors()" class="px-3 py-1.5 rounded-full text-sm transition-colors ${curFilter===c?'bg-blue-600 text-white':'bg-white text-gray-700 hover:bg-gray-100 border border-gray-200'}">${c}</button>`).join('');
}
function renderTutors(){
  const s=($('searchInput')?.value||'');
  const f=allTutors.filter(t=>{
    const ms=!s||t.name.includes(s)||t.specialization.includes(s)||(t.subjects||[]).some(x=>x.includes(s));
    const mf=curFilter==='الكل'||(t.subjects||[]).some(x=>x.includes(curFilter));
    return ms&&mf;
  });
  const grid=$('tutorsGrid');if(!grid)return;
  grid.innerHTML=f.length?f.map(t=>`
    <div onclick="showProfile(${t.id})" class="bg-white rounded-xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden cursor-pointer border border-gray-100 hover:border-blue-300 fade-in">
      <div class="relative h-44 overflow-hidden bg-gray-200"><img src="${t.image}" alt="${t.name}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=👤'">
        <div class="absolute top-3 right-3 bg-white px-2.5 py-0.5 rounded-full flex items-center gap-1 shadow-lg text-sm"><svg class="w-3.5 h-3.5 text-yellow-500 fill-yellow-500" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><b>${t.rating}</b><span class="text-gray-400">(${t.review_count})</span></div></div>
      <div class="p-4"><h4 class="text-lg font-bold mb-1">${t.name}</h4><p class="text-blue-600 text-sm mb-2">${t.specialization||''}</p>
        <div class="flex flex-wrap gap-1.5 mb-3">${(t.subjects||[]).slice(0,3).map(s=>`<span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded text-xs">${s}</span>`).join('')}</div>
        <div class="flex items-center justify-between pt-3 border-t border-gray-100"><div><div class="text-xs text-gray-500">السعر/الساعة</div><div class="text-xl font-bold">${t.hourly_rate} ر.ع</div></div><button class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-blue-700">عرض الملف</button></div></div></div>`).join('')
  :'<div class="col-span-full text-center py-10 text-gray-500">لم يتم العثور على معلمين</div>';
}

// ==================== PROFILE ====================
async function showProfile(id){
  window.scrollTo(0,0);$('app').innerHTML='<div class="flex items-center justify-center py-20"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>';
  const ts=await supaGet('teachers',`?id=eq.${id}`);if(!ts||!ts.length)return goHome();
  selTutor=ts[0];
  const avail=await supaGet('availability',`?teacher_id=eq.${id}&order=id`)||[];
  selTutor._avail=avail;
  const revs=await supaGet('reviews',`?teacher_id=eq.${id}&order=created_at.desc&limit=5`)||[];
  const t=selTutor;const colors=['bg-blue-600','bg-green-600','bg-purple-600','bg-amber-600','bg-pink-600'];
  $('app').innerHTML=`<div class="max-w-7xl mx-auto px-4 py-6 fade-in">
    <button onclick="goHome()" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-5 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>العودة للقائمة</button>

  const stps=[1,2,3].map((s,i)=>`${i>0?`<div class="h-1 w-8 sm:w-14 ${bookStep>=s?'bg-blue-600':'bg-gray-200'}"></div>`:''}

  }else{
    body=`<h3 class="text-xl font-bold mb-4">👤 بياناتك</h3><div class="space-y-3">
      <div><label class="block text-sm font-semibold mb-1">الاسم *</label><input id="bName" value="${curUser?.name||''}" class="w-full px-3 py-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none text-sm"></div>

        <div class="space-y-1.5"><div class="flex justify-between"><span class="text-gray-600">المعلم:</span><b>${t.name}</b></div><div class="flex justify-between"><span class="text-gray-600">المادة:</span><b>${selSubj}</b></div><div class="flex justify-between"><span class="text-gray-600">التاريخ:</span><b>${selDate?AD[selDate.getDay()]+' '+selDate.getDate()+' '+AM[selDate.getMonth()]:''}</b></div><div class="flex justify-between"><span class="text-gray-600">الوقت:</span><b>${selTime}</b></div>

    <div class="bg-white rounded-xl shadow-md p-5"><div class="flex items-center gap-3 pb-4 border-b mb-4"><img src="${t.image}" class="w-12 h-12 rounded-lg object-cover"><div><div class="font-bold">${t.name}</div><div class="text-gray-600 text-xs">${t.specialization||''}</div></div></div>${body}</div></div>`;
}
function pickDate(i){const d=new Date();d.setDate(d.getDate()+i);selDate=d;selTime='';renderBooking();}
function pickTime(t){selTime=t;renderBooking();}
async function confirmBooking(){
  const n=$('bName')?.value,e=$('bEmail')?.value,p=$('bPhone')?.value;
  if(!n||!e||!p){toast('⚠️ أكمل البيانات');return;}
  const bk={booking_code:'BK'+Date.now().toString().slice(-8),teacher_id:selTutor.id,teacher_name:selTutor.name,student_name:n,student_email:e,student_phone:p,subject:selSubj,booking_date:selDate.toISOString().slice(0,10),booking_time:selTime,price:selTutor.hourly_rate,status:'active'};

}

          <div><label class="block text-sm font-semibold mb-1">سعر الساعة (ر.ع)</label><input id="tPrice" type="number" value="${t.hourly_rate||0}" class="w-full px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none"></div>
          <div><label class="block text-sm font-semibold mb-1">سنوات الخبرة</label><input id="tExp" type="number" value="${t.experience||0}" class="w-full px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none"></div>
          <div><label class="block text-sm font-semibold mb-1">اللغات (فاصلة)</label><input id="tLangs" value="${(t.languages||[]).join('، ')}" class="w-full px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none"></div>
        </div>
        <div><label class="block text-sm font-semibold mb-1">المواد الدراسية (فاصلة)</label><input id="tSubs" value="${(t.subjects||[]).join('، ')}" class="w-full px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none"></div>
        ${t.image?`<div><label class="block text-sm font-semibold mb-1">معاينة الصورة</label><img src="${t.image}" class="w-24 h-24 rounded-xl object-cover border" onerror="this.style.display='none'"></div>`:''}
        <button onclick="saveTeacherProfile(${t.id})" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-green-700">💾 حفظ التعديلات</button>
      </div></div>`;
  }else if(tab==='schedule'){
    const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس"];
    const avail=window._tAvail||[];
    $('tContent').innerHTML=`<div class="bg-white rounded-xl p-5 border">
      <h3 class="font-bold mb-4">🕐 إدارة المواعيد</h3>
      <div class="space-y-3">${days.map(d=>{const av=avail.find(a=>a.day_name===d);return`<div class="p-3 bg-gray-50 rounded-lg border"><div class="font-semibold text-sm mb-1.5">${d}</div><input id="slot_${d}" value="${(av?.slots||[]).join('، ')}" placeholder="09:00، 10:00، 14:00" class="w-full px-3 py-2 border-2 border-gray-200 rounded-lg text-sm focus:border-green-500 focus:outline-none" dir="ltr"><div class="text-xs text-gray-400 mt-1">أدخل الأوقات مفصولة بفاصلة</div></div>`;}).join('')}
        <button onclick="saveSchedule(${t.id})" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-green-700">💾 حفظ المواعيد</button>
      </div></div>`;
  }else if(tab==='bookings'){
    const bks=window._tBooks||[];
    $('tContent').innerHTML=`<div class="bg-white rounded-xl p-5 border"><h3 class="font-bold mb-4">📅 حجوزاتي (${bks.length})</h3>
      ${bks.length?bks.map(b=>`<div class="p-3 bg-gray-50 rounded-lg border mb-2 text-sm"><div class="flex justify-between mb-1"><b>${b.student_name}</b><span class="px-2 py-0.5 rounded-full text-xs font-bold ${b.status==='active'?'bg-green-50 text-green-600':b.status==='cancelled'?'bg-red-50 text-red-600':'bg-amber-50 text-amber-600'}">${b.status==='active'?'مؤكد':b.status==='cancelled'?'ملغي':'مكتمل'}</span></div>
        <div class="text-gray-500 text-xs">📚 ${b.subject} · 📅 ${b.booking_date} · 🕐 ${b.booking_time} · 💰 ${b.price} ر.ع</div></div>`).join(''):'<div class="text-center py-8 text-gray-400">لا توجد حجوزات</div>'}
    </div>`;
  }else{
    const revs=window._tRevs||[];
    $('tContent').innerHTML=`<div class="bg-white rounded-xl p-5 border"><h3 class="font-bold mb-4">⭐ التقييمات (${revs.length})</h3>
      ${revs.length?revs.map(r=>`<div class="p-3 bg-gray-50 rounded-lg border mb-2 text-sm"><div class="flex justify-between mb-1"><b>${r.reviewer_name}</b><div>${stars(r.rating)}</div></div><p class="text-gray-600 text-xs">${r.comment||''}</p></div>`).join(''):'<div class="text-center py-8 text-gray-400">لا توجد تقييمات</div>'}
    </div>`;
  }
}

async function saveTeacherProfile(id){
  const data={name:$('tName').value,image:$('tImg').value,specialization:$('tSpec').value,bio:$('tBio').value,hourly_rate:+$('tPrice').value,experience:+$('tExp').value,
    languages:$('tLangs').value.split(/[,،]/).map(s=>s.trim()).filter(Boolean),
    subjects:$('tSubs').value.split(/[,،]/).map(s=>s.trim()).filter(Boolean)};
  const r=await supaPatch('teachers',data,`?id=eq.${id}`);
  if(r)toast('✅ تم الحفظ!');else toast('❌ خطأ');
  showTeacherDash();
}
async function saveSchedule(tid){
  const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس"];
  for(const d of days){
    const val=$('slot_'+d)?.value||'';
    const slots=val.split(/[,،]/).map(s=>s.trim()).filter(Boolean);
    await supaDel('availability',`?teacher_id=eq.${tid}&day_name=eq.${encodeURIComponent(d)}`);
    if(slots.length)await supaPost('availability',[{teacher_id:tid,day_name:d,slots}]);
  }
  toast('✅ تم حفظ المواعيد!');showTeacherDash();
}

// ==================== ADMIN PANEL ====================
async function showAdmin(){
  if(!curUser||curUser.role!=='admin')return;
  $('userDrop').classList.add('hidden');window.scrollTo(0,0);
  $('app').innerHTML='<div class="flex items-center justify-center py-20"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>';
  const users=await supaGet('users','?order=id')||[];
  const bks=await supaGet('bookings','?order=created_at.desc')||[];
  const teachers=await supaGet('teachers','?order=id')||[];
  const totalRev=bks.filter(b=>b.status!=='cancelled').reduce((s,b)=>s+(+b.price||0),0);
  window._aUsers=users;window._aBooks=bks;window._aTeachers=teachers;

  $('app').innerHTML=`<div class="max-w-7xl mx-auto px-4 py-6 fade-in">
    <button onclick="goHome()" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-4 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>الرئيسية</button>
    <div class="bg-gradient-to-br from-blue-600 to-blue-800 text-white rounded-xl p-5 mb-5"><h2 class="text-xl font-bold">⚙️ لوحة التحكم</h2><p class="text-blue-200 text-sm mt-0.5">إدارة المستخدمين والمعلمين والحجوزات</p></div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
      <div class="bg-white rounded-xl p-4 border"><div class="text-xl">👥</div><div class="text-2xl font-bold">${users.length}</div><div class="text-xs text-gray-500">مستخدمون</div></div>
      <div class="bg-white rounded-xl p-4 border"><div class="text-xl">👨‍🏫</div><div class="text-2xl font-bold">${teachers.length}</div><div class="text-xs text-gray-500">معلمون</div></div>
      <div class="bg-white rounded-xl p-4 border"><div class="text-xl">📅</div><div class="text-2xl font-bold">${bks.length}</div><div class="text-xs text-gray-500">حجوزات</div></div>
      <div class="bg-white rounded-xl p-4 border"><div class="text-xl">💰</div><div class="text-2xl font-bold">${totalRev} ر.ع</div><div class="text-xs text-gray-500">إيرادات</div></div>
    </div>
    <div class="flex gap-1.5 bg-white p-1 rounded-xl border mb-5">
      <button onclick="showATab('users')" class="flex-1 py-2 rounded-lg font-semibold text-sm bg-blue-600 text-white" id="auUsers">👥 مستخدمون</button>
      <button onclick="showATab('teachers')" class="flex-1 py-2 rounded-lg font-semibold text-sm text-gray-600" id="auTeachers">👨‍🏫 معلمون</button>
      <button onclick="showATab('bookings')" class="flex-1 py-2 rounded-lg font-semibold text-sm text-gray-600" id="auBookings">📅 حجوزات</button>
    </div>
    <div id="aContent"></div>
  </div>`;
  showATab('users');
}

function showATab(tab){
  ['auUsers','auTeachers','auBookings'].forEach(id=>{const el=$(id);if(el)el.className='flex-1 py-2 rounded-lg font-semibold text-sm '+(id==='au'+tab.charAt(0).toUpperCase()+tab.slice(1)?'bg-blue-600 text-white':'text-gray-600 hover:bg-gray-50');});
  if(tab==='users'){
    const users=window._aUsers||[];
    $('aContent').innerHTML=users.map(u=>`<div class="bg-white rounded-xl p-4 border shadow-sm mb-2">
      <div class="flex items-center justify-between"><div class="flex items-center gap-2"><div class="w-9 h-9 rounded-lg ${u.role==='admin'?'bg-red-500':u.role==='teacher'?'bg-green-500':'bg-blue-600'} text-white flex items-center justify-center font-bold text-sm">${u.name[0]}</div><div><div class="font-semibold text-sm">${u.name}</div><div class="text-xs text-gray-500">${u.email}</div></div></div>
      <div class="flex items-center gap-2"><span class="px-2 py-0.5 rounded-full text-xs font-bold ${u.role==='admin'?'bg-red-50 text-red-600':u.role==='teacher'?'bg-green-50 text-green-600':'bg-blue-50 text-blue-600'}">${u.role==='admin'?'مدير':u.role==='teacher'?'معلم':'مستخدم'}</span></div></div>
      ${u.role!=='admin'?`<div class="flex gap-1.5 justify-end mt-2">
        <button onclick="changeRole(${u.id},'user')" class="px-2 py-1 text-xs border rounded-lg ${u.role==='user'?'bg-blue-50 text-blue-600 border-blue-200':'hover:bg-gray-50'}">مستخدم</button>
        <button onclick="changeRole(${u.id},'teacher')" class="px-2 py-1 text-xs border rounded-lg ${u.role==='teacher'?'bg-green-50 text-green-600 border-green-200':'hover:bg-gray-50'}">معلم</button>
        <button onclick="changeRole(${u.id},'admin')" class="px-2 py-1 text-xs border rounded-lg hover:bg-gray-50">مدير</button>
        <button onclick="delUser(${u.id})" class="px-2 py-1 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50">🗑️</button>
      </div>`:''}</div>`).join('');
  }else if(tab==='teachers'){
    const ts=window._aTeachers||[];
    $('aContent').innerHTML=`<div class="mb-3"><button onclick="addTeacherForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700">➕ إضافة معلم جديد</button></div>
    <div id="addTeacherArea"></div>
    ${ts.map(t=>`<div class="bg-white rounded-xl p-4 border shadow-sm mb-2 flex items-center justify-between">
      <div class="flex items-center gap-3"><img src="${t.image}" class="w-10 h-10 rounded-lg object-cover" onerror="this.src='https://via.placeholder.com/80?text=👤'"><div><div class="font-semibold text-sm">${t.name}</div><div class="text-xs text-gray-500">${(t.subjects||[]).join('، ')}</div></div></div>
      <div class="flex items-center gap-2"><span class="text-sm font-bold text-blue-600">${t.hourly_rate} ر.ع</span><span class="text-xs text-gray-500">⭐ ${t.rating}</span>
      <button onclick="toggleTeacher(${t.id},${!t.is_active})" class="px-2 py-1 text-xs border rounded-lg ${t.is_active?'text-red-600 border-red-200 hover:bg-red-50':'text-green-600 border-green-200 hover:bg-green-50'}">${t.is_active?'تعطيل':'تفعيل'}</button>
      <button onclick="delTeacher(${t.id})" class="px-2 py-1 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50">🗑️</button></div></div>`).join('')}`;
  }else{
    const bks=window._aBooks||[];
    $('aContent').innerHTML=bks.length?bks.map(b=>`<div class="bg-white rounded-xl p-4 border shadow-sm mb-2 text-sm">
      <div class="flex items-center justify-between mb-1"><div><b>${b.teacher_name}</b> ← ${b.student_name}</div>
      <span class="px-2 py-0.5 rounded-full text-xs font-bold ${b.status==='active'?'bg-green-50 text-green-600':b.status==='cancelled'?'bg-red-50 text-red-600':'bg-amber-50 text-amber-600'}">${b.status==='active'?'مؤكد':b.status==='cancelled'?'ملغي':'مكتمل'}</span></div>
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">${b.subject} · ${b.booking_date} · ${b.booking_time} · ${b.price} ر.ع</span>
      ${b.status==='active'?`<button onclick="cancelBookAdmin(${b.id})" class="text-xs text-red-600 border border-red-200 px-2 py-0.5 rounded-lg">إلغاء</button>`:''}</div></div>`).join(''):'<div class="text-center py-8 text-gray-400">لا توجد حجوزات</div>';
  }
}

function addTeacherForm(){
  $('addTeacherArea').innerHTML=`<div class="bg-green-50 rounded-xl p-4 border-2 border-green-200 mb-4">
    <h4 class="font-bold mb-3 text-sm">➕ إضافة معلم جديد</h4>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
      <input id="ntName" placeholder="اسم المعلم" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm">
      <input id="ntEmail" placeholder="البريد الإلكتروني" dir="ltr" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm">
      <input id="ntSpec" placeholder="التخصص" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm">
      <input id="ntPrice" type="number" placeholder="سعر الساعة" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm">
      <input id="ntImg" placeholder="رابط الصورة (اختياري)" dir="ltr" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm">
      <input id="ntPw" placeholder="كلمة المرور" dir="ltr" value="123456" class="px-3 py-2 border-2 border-gray-200 rounded-lg text-sm">
    </div>
    <div class="flex gap-2"><button onclick="createTeacher()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">✅ إنشاء</button><button onclick="$('addTeacherArea').innerHTML=''" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm">إلغاء</button></div>
  </div>`;
}
async function createTeacher(){
  const name=$('ntName').value,email=$('ntEmail').value,spec=$('ntSpec').value,price=+$('ntPrice').value,img=$('ntImg').value,pw=$('ntPw').value||'123456';
  if(!name||!email)return toast('⚠️ أدخل الاسم والبريد');
  const uRes=await supaPost('users',[{name,email,phone:'',password:pw,role:'teacher'}]);
  if(!uRes||!uRes.length)return toast('❌ خطأ أو البريد موجود');
  await supaPost('teachers',[{user_id:uRes[0].id,name,image:img||'https://via.placeholder.com/400?text=👤',specialization:spec,hourly_rate:price,subjects:[],languages:['العربية']}]);
  toast('✅ تم إضافة المعلم');showAdmin();
}
async function changeRole(uid,role){
  await supaPatch('users',{role},`?id=eq.${uid}`);
  if(role==='teacher'){const u=(window._aUsers||[]).find(x=>x.id===uid);if(u){const exist=await supaGet('teachers',`?user_id=eq.${uid}`);if(!exist||!exist.length)await supaPost('teachers',[{user_id:uid,name:u.name,image:'https://via.placeholder.com/400?text=👤',subjects:[],languages:['العربية']}]);}}
  toast('✅ تم التغيير');showAdmin();
}
async function delUser(uid){if(!confirm('حذف هذا المستخدم؟'))return;await supaDel('users',`?id=eq.${uid}`);toast('تم الحذف');showAdmin();}
async function toggleTeacher(tid,active){await supaPatch('teachers',{is_active:active},`?id=eq.${tid}`);toast(active?'✅ تم التفعيل':'⛔ تم التعطيل');showAdmin();}
async function delTeacher(tid){if(!confirm('حذف هذا المعلم؟'))return;await supaDel('teachers',`?id=eq.${tid}`);toast('تم الحذف');showAdmin();}
async function cancelBookAdmin(bid){await supaPatch('bookings',{status:'cancelled'},`?id=eq.${bid}`);toast('تم الإلغاء');showAdmin();}

// ==================== INIT ====================
goHome();updateUI();
</script>
</body>
</html>
